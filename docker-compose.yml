# Optional local dev via Docker. The database is SQLite (local file) or Turso
# (remote libSQL via DATABASE_URI) — no separate DB container is needed.
services:
  app:
    image: node:22-alpine
    ports:
      - '3000:3000'
    volumes:
      - .:/home/node/app
      - node_modules:/home/node/app/node_modules
    working_dir: /home/node/app/
    command: sh -c "corepack enable && npm install && npm run dev"
    env_file:
      - .env

volumes:
  node_modules:
